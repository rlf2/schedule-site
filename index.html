<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 스케줄</title>

<style>
body {
  margin: 0;
  background: #f5f7fb;
}

/* 여백만 살짝 */
.container {
  padding: 10px;
}

/* 카드 느낌 */
.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

/* 스케줄 */
iframe {
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <iframe src="team_schedule.html"></iframe>
  </div>
</div>

</body>
</html>
