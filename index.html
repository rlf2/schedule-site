<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 스케줄</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fb;
}

.header {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: white;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 16px;
}

.menu {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.menu button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #e5e7eb;
  cursor: pointer;
  font-weight: 500;
}

.menu button.active {
  background: #4f46e5;
  color: white;
}

.card {
  background: white;
  border-radius: 14px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 80vh;
  border: none;
}
</style>
</head>

<body>

<div class="header">
  📅 팀 스케줄
</div>

<div class="container">

  <div class="menu">
    <button class="active" onclick="showSchedule(this)">스케줄</button>
    <button onclick="showSetting(this)">설정</button>
  </div>

  <div class="card" id="content">
    <!-- ✅ 기존 스케줄 그대로 유지 -->
    <iframe src="team_schedule.html"></iframe>
  </div>

</div>

<script>
function showSchedule(btn){
  setActive(btn);

  // 👉 기존 스케줄 그대로 불러오기 (핵심)
  document.getElementById('content').innerHTML =
    '<iframe src="team_schedule.html"></iframe>';
}

function showSetting(btn){
  setActive(btn);

  // 👉 설정만 추가 (기존 기능 영향 없음)
  document.getElementById('content').innerHTML =
    `
    <div style="padding:20px;">
      <h3>⚙️ 설정</h3>
      <p>여기에 기능 추가 가능</p>

      <button onclick="alert('다크모드 (추후 추가)')" style="padding:10px;margin-top:10px;">
        다크모드
      </button>
    </div>
    `;
}

function setActive(btn){
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
